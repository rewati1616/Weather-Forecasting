<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RewatiWeather 🌤️</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>🌤️ RewatiWeatherApp 🌤️</h1>
      <p class="welcome">Hi Everyone! What's the weather like today?</p>
    </header>

    <div class="search-area">
      <input type="text" id="cityInput" placeholder="Search city (e.g. Pune, Mumbai, London)" />
      <button id="searchBtn">Search</button>
      <button id="locationBtn">📍 My Location</button>
    </div>

    <div id="weatherContent">
      <!-- Current weather and forecasts loaded by JavaScript -->
    </div>

    <div class="footer">
       Developed by Rewati • Weather_Forecasting
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
